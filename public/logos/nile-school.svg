<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Nile Language School - Teal green, book/education motif -->
  <circle cx="100" cy="100" r="98" fill="#00695C"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>
  <!-- Open book icon -->
  <g transform="translate(100,72)">
    <!-- Left page -->
    <path d="M-5,20 L-5,-18 Q-5,-22 -30,-22 L-30,16 Q-5,16 -5,20Z" fill="none" stroke="#A5D6A7" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M5,20 L5,-18 Q5,-22 30,-22 L30,16 Q5,16 5,20Z" fill="none" stroke="#A5D6A7" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#A5D6A7" stroke-width="2"/>
    <!-- Text lines on pages -->
    <line x1="-25" y1="-12" x2="-10" y2="-12" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="-4" x2="-10" y2="-4" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="4" x2="-10" y2="4" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="-12" x2="25" y2="-12" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="-4" x2="25" y2="-4" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="4" x2="25" y2="4" stroke="#A5D6A7" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- NLS text -->
  <text x="100" y="145" font-family="'Georgia','Times New Roman',serif" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">NLS</text>
  <line x1="72" y1="155" x2="128" y2="155" stroke="#A5D6A7" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
