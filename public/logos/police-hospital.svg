<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Police Hospital Alexandria - Navy blue, medical cross + shield motif -->
  <circle cx="100" cy="100" r="98" fill="#1A237E"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>
  <!-- Shield shape -->
  <path d="M100,35 L140,55 L140,95 Q140,130 100,155 Q60,130 60,95 L60,55 Z" fill="#283593" stroke="#5C6BC0" stroke-width="1.5"/>
  <!-- Medical cross inside shield -->
  <rect x="92" y="58" width="16" height="55" rx="3" fill="#fff"/>
  <rect x="75" y="75" width="50" height="16" rx="3" fill="#fff"/>
  <!-- Star accent -->
  <circle cx="100" cy="130" r="6" fill="#FFD54F"/>
  <polygon points="100,123 102,128 107,128 103,131 104,136 100,133 96,136 97,131 93,128 98,128" fill="#FFD54F"/>
</svg>
