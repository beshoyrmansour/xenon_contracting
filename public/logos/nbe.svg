<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- NBE - National Bank of Egypt: Green + Orange brand colors, column/pillar motif -->
  <circle cx="100" cy="100" r="98" fill="#006B3F"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="2" opacity="0.2"/>
  <!-- Stylized pillar/column icon -->
  <rect x="80" y="50" width="40" height="8" rx="2" fill="#E8A317"/>
  <rect x="83" y="58" width="6" height="52" rx="1" fill="#E8A317"/>
  <rect x="97" y="58" width="6" height="52" rx="1" fill="#E8A317"/>
  <rect x="111" y="58" width="6" height="52" rx="1" fill="#E8A317"/>
  <rect x="78" y="110" width="44" height="8" rx="2" fill="#E8A317"/>
  <!-- NBE text -->
  <text x="100" y="148" font-family="'Georgia','Times New Roman',serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">NBE</text>
  <!-- Subtle arc accent -->
  <path d="M85 44 Q100 34 115 44" fill="none" stroke="#E8A317" stroke-width="3" stroke-linecap="round"/>
