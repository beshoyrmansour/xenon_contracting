<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-et">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="58" fill="#222" filter="url(#shadow-et)"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#000" stroke-width="0.5" opacity="0.5"/>
  <text x="60" y="75" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="bold" fill="#7AB800" text-anchor="middle" dominant-baseline="middle">e&amp;</text>
</svg>