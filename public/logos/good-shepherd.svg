  <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>
  <!-- Heart shape -->
  <path d="M100,110 Q70,85 70,68 Q70,52 85,52 Q95,52 100,62 Q105,52 115,52 Q130,52 130,68 Q130,85 100,110Z" fill="none" stroke="#F48FB1" stroke-width="3" stroke-linejoin="round"/>
  <path d="M100,105 Q75,85 75,70 Q75,57 87,57 Q95,57 100,65 Q105,57 113,57 Q125,57 125,70 Q125,85 100,105Z" fill="#F48FB1" opacity="0.15"/>
  <!-- Medical cross inside heart -->
