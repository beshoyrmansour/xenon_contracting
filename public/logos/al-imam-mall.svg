<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Al-Imam Mall - Purple/magenta, shopping/building motif -->
  <circle cx="100" cy="100" r="98" fill="#4A148C"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.12"/>
  <!-- Stylized mall building -->
  <rect x="65" y="60" width="70" height="55" rx="4" fill="none" stroke="#CE93D8" stroke-width="2.5"/>
  <!-- Windows grid -->
  <rect x="74" y="70" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="94" y="70" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="114" y="70" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="74" y="90" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="94" y="90" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <rect x="114" y="90" width="12" height="12" rx="2" fill="#CE93D8" opacity="0.5"/>
  <!-- Door -->
  <rect x="92" y="100" width="16" height="15" rx="8 8 0 0" fill="#CE93D8" opacity="0.7"/>
  <!-- Dome/arch top -->
  <path d="M80,60 Q100,40 120,60" fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="100" y="148" font-family="'Georgia','Times New Roman',serif" font-size="22" font-weight="bold" fill="#FFD700" text-anchor="middle">IMAM</text>
</svg>
